server {
    listen       80;
    server_name  localhost;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Static assets with content hash (immutable, no SWR needed)
    location ^~ /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        root /usr/share/nginx/html;
    }

    # Images (browser: 1 min + SWR, CDN: 5 min + SWR)
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg)$ {
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=3600";
        add_header CDN-Cache-Control "public, max-age=300, stale-while-revalidate=3600";
        root /usr/share/nginx/html;
    }

    # Manifest and JSON files (browser: 1 min + SWR, CDN: 5 min + SWR)
    location ~* \.(webmanifest|json)$ {
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=3600";
        add_header CDN-Cache-Control "public, max-age=300, stale-while-revalidate=3600";
        root /usr/share/nginx/html;
    }

    # HTML (browser: 1 min + SWR, CDN: 5 min + SWR)
    location / {
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=3600";
        add_header CDN-Cache-Control "public, max-age=300, stale-while-revalidate=3600";
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=3600";
        add_header CDN-Cache-Control "public, max-age=300, stale-while-revalidate=3600";
        root   /usr/share/nginx/html;
    }
}
